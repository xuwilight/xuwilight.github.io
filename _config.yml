# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site (修改为你自己的信息)
title: xuwilight
subtitle: ''
description: '这是我的个人博客，记录技术、生活和思考。'
keywords:
author: xuwilight
language: zh-CN
timezone: 'Asia/Shanghai'

# URL (部署到 GitHub Pages 时修改为 https://<你的用户名>.github.io)
url: http://xuwilight.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## 使用 Stellar 主题
theme: stellar

# Deployment
deploy:
  type: ''

# 注入自定义标签到 <head>（如 CDN 字体）
inject:
  head:
    # 霞鹜文楷 - 免费可商用的中文网络字体
    - '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" />'
    # 自定义样式（侧边栏遮罩等）
    - '<link rel="stylesheet" href="/css/custom.css" />'

######## Stellar 主题配置 ########
# 你可以在这里覆盖主题 _config.yml 中的任何配置项
# 完整配置参考: https://xaoxuu.com/wiki/stellar/

theme_config:

  # 左上角 logo 区域
  logo:
    avatar: '[/images/avatar.jpg](/about/)'
    title: '[{config.title}](/)'
    subtitle: '{config.subtitle}'

  # 侧边栏主导航菜单
  menubar:
    columns: 3
    items:
      - id: post
        theme: '#1BCDFC'
        # icon: solar:documents-bold-duotone
        title: 博客
        url: /
      - id: categories
        theme: '#3DC550'
        # icon: solar:notebook-bookmark-bold-duotone
        title: 分类
        url: /categories/
      # - id: tags
      #   theme: '#FA6400'
      #   icon: solar:hashtag-square-bold
      #   title: 标签
      #   url: /tags/
      - id: archives
        theme: '#F44336'
        # icon: default:calendar
        title: 归档
        url: /archives/

  # 站点结构树 - 定义每种页面的布局
  site_tree:
    # 主页
    home:
      leftbar: nav_links, recent
      rightbar:
    # 博客列表页（包含分类/标签/归档页）
    index_blog:
      base_dir: blog
      menu_id: post  # 默认高亮"博客"，分类/标签/归档页自动改为对应 menu_id
      leftbar: nav_links, recent
      rightbar:
      nav_tabs:
    # 文档列表页
    index_wiki:
      base_dir: wiki
      menu_id: wiki
      leftbar: nav_links, related, recent
      rightbar:
      nav_tabs:
    # 文章内页
    post:
      menu_id: post
      leftbar: nav_links, related, recent
      rightbar: toc
    # Wiki 内页
    wiki:
      menu_id: wiki
      leftbar: nav_links, tree, related, recent
      rightbar: toc
    # 自定义页面
    page:
      leftbar: nav_links, recent
      rightbar: toc

  # 文章配置
  article:
    type: tech  # tech / story
    auto_excerpt: 200
    license: '本文采用 [署名-非商业性使用-相同方式共享 4.0 国际](https://creativecommons.org/licenses/by-nc-sa/4.0/) 许可协议，转载请注明出处。'
    share:

  # 搜索
  search:
    service: local_search
    local_search:
      field: all
      path: /search.json
      content: true

  # 评论 (以 Giscus 为例，可替换)
  comments:
    service:  # beaudar, utterances, giscus, twikoo, waline, artalk
    comment_title: 快来参与讨论吧~

  # 样式
  style:
    prefers_theme: auto  # auto / light / dark
    font-family:
      # 中文字体推荐：LXGW WenKai（霞鹜文楷）、Noto Sans SC、PingFang SC
      # 英文字体推荐：Inter、Roboto、system-ui
      body: '"LXGW WenKai", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, -apple-system, sans-serif'
      code: '"JetBrains Mono", "Fira Code", Menlo, Monaco, "Courier New", monospace'
      codeblock: '"JetBrains Mono", "Fira Code", Menlo, Monaco, "Courier New", monospace'
    font-size:
      root: 17px
      body: 18px
    color:
      theme: '#1BCDFC'
    # 侧边栏样式
    leftbar:
      blur-px: 100px            # 模糊强度（0px = 关闭模糊/光晕，必须带 px 单位！）
      # background-opacity: 0.6
      # background-image: 'url(/images/background.jpg)'    # 侧边栏背景图
      background-color-light: rgba(255,255,255,0.6)  # 亮色模式侧边栏背景
      background-color-dark: rgba(30,30,30,0.7)       # 暗色模式侧边栏背景
    # 主内容区
    site:
      blur-px: 100px       # 主内容区毛玻璃模糊强度
      blur-sat: 100%     # 模糊饱和度

  # 侧边栏底部社交链接
