# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site (修改为你自己的信息)
title: xuwilight
subtitle: '沉淀...'
description: '这是我的个人博客，记录技术、生活和思考。'
keywords:
author: xuwilight
language: zh-CN
timezone: 'Asia/Shanghai'

# URL (部署到 GitHub Pages 时修改为 https://<你的用户名>.github.io)
url: http://xuwilight.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## 使用 Stellar 主题
theme: stellar

# Deployment
deploy:
  type: ''


######## Stellar 主题配置 ########
# 你可以在这里覆盖主题 _config.yml 中的任何配置项
# 完整配置参考: https://xaoxuu.com/wiki/stellar/

stellar:

  # 左上角 logo 区域
  logo:
    avatar: '[https://cdn.jsdelivr.net/gh/xaoxuu/cdn-assets/avatar/avatar.png](/about/)'
    title: '[{config.title}](/)'
    subtitle: '{config.subtitle}'

  # 侧边栏主导航菜单
  menubar:
    columns: 4
    items:
      - id: post
        theme: '#1BCDFC'
        icon: solar:documents-bold-duotone
        title: 博客
        url: /
      - id: wiki
        theme: '#3DC550'
        icon: solar:notebook-bookmark-bold-duotone
        title: 文档
        url: /wiki/
      - id: explore
        theme: '#FA6400'
        icon: solar:planet-bold-duotone
        title: 探索
        url: /friends/
      - id: social
        theme: '#F44336'
        icon: solar:chat-square-like-bold-duotone
        title: 社交
        url: /friends/

  # 站点结构树 - 定义每种页面的布局
  site_tree:
    # 主页
    home:
      leftbar: welcome, recent
      rightbar:
    # 博客列表页
    index_blog:
      base_dir: blog
      menu_id: post
      leftbar: welcome, recent
      rightbar:
      nav_tabs:
    # 文档列表页
    index_wiki:
      base_dir: wiki
      menu_id: wiki
      leftbar: related, recent
      rightbar:
      nav_tabs:
    # 文章内页
    post:
      menu_id: post
      leftbar: related, recent
      rightbar: toc
    # Wiki 内页
    wiki:
      menu_id: wiki
      leftbar: tree, related, recent
      rightbar: toc
    # 自定义页面
    page:
      leftbar: recent
      rightbar: toc

  # 文章配置
  article:
    type: tech  # tech / story
    auto_excerpt: 200
    license: '本文采用 [署名-非商业性使用-相同方式共享 4.0 国际](https://creativecommons.org/licenses/by-nc-sa/4.0/) 许可协议，转载请注明出处。'
    share:

  # 搜索
  search:
    service: local_search
    local_search:
      field: all
      path: /search.json
      content: true

  # 评论 (以 Giscus 为例，可替换)
  comments:
    service:  # beaudar, utterances, giscus, twikoo, waline, artalk
    comment_title: 快来参与讨论吧~

  # 样式
  style:
    prefers_theme: auto  # auto / light / dark
    font-family:
      body: 'system-ui, "Microsoft YaHei", "PingFang SC", sans-serif'
      code: 'Menlo, Monaco, "Courier New", monospace'
      codeblock: 'Menlo, Monaco, "Courier New", monospace'
    font-size:
      root: 16px
      body: 16px
    color:
      theme: '#1BCDFC'
