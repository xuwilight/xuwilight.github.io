# Hexo Configuration
## Docs: https://hexo.io/docs/configuration.html

# Site (修改为你自己的信息)
title: xuwilight
subtitle: ''
description: ''
favicon: 'assets/avatar.jpg'
keywords:
author: xuwilight
language: zh-CN
timezone: 'Asia/Shanghai'

# URL (部署到 GitHub Pages 时修改为 https://<你的用户名>.github.io)
url: http://xuwilight.github.io
root: /
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
## 使用 Stellar 主题
theme: stellar

# Deployment
deploy:
  type: ''

# 注入自定义标签到 <head>（如 CDN 字体）
inject:
  head:
    # 霞鹜文楷 - 免费可商用的中文网络字体
    - '<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/lxgw-wenkai-webfont@1.7.0/style.css" />'
    # 自定义样式（侧边栏遮罩等）
    - '<link rel="stylesheet" href="/css/custom.css" />'



# theme_config:
